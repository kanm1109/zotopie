  <!-- Network connection lines -->
  <line x1="408" y1="168" x2="256" y2="256" stroke="#FFFFFF" stroke-width="2.5" opacity="0.22"/>
  <line x1="256" y1="256" x2="104" y2="344" stroke="#FFFFFF" stroke-width="2.5" opacity="0.22"/>

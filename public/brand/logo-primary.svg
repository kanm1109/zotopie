<svg width="450" height="120" viewBox="0 0 450 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Z stroke gradient: top-left to bottom-right matches icon direction -->
    <linearGradient id="zg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Z mark: gradient stroke, no background (for use on white/light surfaces) -->
  <path d="M 18 30 L 100 30 L 18 90 L 100 90"
    stroke="url(#zg)" stroke-width="17" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Network nodes: gradient-matched colors (visible on white) -->
  <circle cx="100" cy="30" r="7" fill="#7C3AED" opacity="0.72"/>
  <circle cx="59" cy="60" r="4.5" fill="#6366F1" opacity="0.50"/>
  <circle cx="18" cy="90" r="7" fill="#0EA5E9" opacity="0.72"/>
  <!-- Wordmark -->
  <text x="120" y="74"
    font-family='"Plus Jakarta Sans","Helvetica Neue",Helvetica,Arial,sans-serif'
    font-size="50" font-weight="800" fill="#0F172A" letter-spacing="-0.5">Zotopie</text>
  <!-- Tagline -->
  <text x="122" y="99"
    font-family='"Plus Jakarta Sans","Helvetica Neue",Helvetica,Arial,sans-serif'
    font-size="10.5" font-weight="600" fill="#6B7280" letter-spacing="2.8">DISCOVER THE BEST AI TOOLS</text>
</svg>
